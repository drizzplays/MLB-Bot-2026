name: Run MLB Bot every 10 minutes

on:
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

concurrency:
  group: mlb-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Ensure state file exists
        run: |
          test -f combined_state.json || echo "{}" > combined_state.json

      - name: Run combined bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python combined_bot.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add combined_state.json

          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "Update combined bot state"

          git fetch origin main
          git rebase origin/main || true
          git push origin HEAD:main
